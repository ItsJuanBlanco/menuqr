<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0c">
  <meta name="description" content="Carta digital — La Brasa Gastrobar, Medellín">
  <title>La Brasa Gastrobar · Inicio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app home">
    <header class="header">
      <div class="header__brand">
        <span class="header__logo" aria-hidden="true">🔥</span>
        <div>
          <h1 class="header__title">La Brasa</h1>
          <p class="header__subtitle">Gastrobar · Medellín</p>
        </div>
      </div>
      <div class="header__table" id="tableBadge">Mesa 1</div>
    </header>

    <main class="home__main">
      <p class="home__welcome">¿Qué deseas hacer?</p>
      <nav class="home__actions" aria-label="Acciones principales">
        <a class="home__btn" id="linkCarta" href="index.html">
          <span class="home__btn-icon" aria-hidden="true">📋</span>
          Ver Carta
        </a>
        <a class="home__btn" id="linkCuenta" href="index.html#cuenta">
          <span class="home__btn-icon" aria-hidden="true">🧾</span>
          Mi Cuenta
        </a>
        <button type="button" class="home__btn home__btn--accent" id="homeCallWaiter">
          <span class="home__btn-icon" aria-hidden="true">🛎️</span>
          Llamar Mesero
        </button>
      </nav>
      <p class="home__status" id="homeStatus" aria-live="polite"></p>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="home.js"></script>
</body>
</html>
