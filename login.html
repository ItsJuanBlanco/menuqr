<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f4f4f5">
  <meta name="robots" content="noindex, nofollow">
  <title>Acceso al panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/panel.css">
  <link rel="stylesheet" href="/admin.css">
</head>
<body>
  <div class="admin-login">
    <div class="admin-login__card">
      <div class="admin-login__brand">
        <img class="listo-logo listo-logo--login" data-listo-logo alt="Listo" hidden>
        <h1 class="admin-login__title" id="panelLoginRestaurantName">Panel del negocio</h1>
        <p class="admin-login__subtitle">Ingresá tu PIN para continuar</p>
      </div>
      <form class="admin-login__form" id="panelLoginForm">
        <label class="admin-login__label" for="panelLoginPin">PIN</label>
        <input
          type="password"
          class="admin-login__input"
          id="panelLoginPin"
          name="pin"
          inputmode="numeric"
          autocomplete="off"
          placeholder="••••"
          required
        >
        <button type="submit" class="admin-login__btn" id="panelLoginBtn">Ingresar</button>
      </form>
      <p class="admin-login__error" id="panelLoginError" hidden role="alert"></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/config.js"></script>
  <script src="/restaurant.js"></script>
  <script src="/panel-auth.js"></script>
  <script src="/login.js"></script>
</body>
</html>
