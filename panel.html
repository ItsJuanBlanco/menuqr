<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f4f4f5">
  <title>Panel · La Brasa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <div class="panel-app">
    <header class="panel-header">
      <div class="panel-header__left">
        <h1 class="panel-header__title">Panel del negocio</h1>
        <p class="panel-header__subtitle">Mesero · Cocina</p>
      </div>
      <div class="panel-header__right">
        <span class="panel-header__live" id="liveIndicator">
          <span class="panel-header__dot" aria-hidden="true"></span>
          En vivo
        </span>
        <span class="panel-header__count" id="headerCount">0 pedidos</span>
      </div>
    </header>

    <nav class="panel-tabs" role="tablist" aria-label="Secciones del panel">
      <button type="button" class="panel-tabs__btn panel-tabs__btn--active" id="tabPedidos" role="tab" aria-selected="true" data-panel="pedidos">Pedidos</button>
      <button type="button" class="panel-tabs__btn" id="tabMesas" role="tab" aria-selected="false" data-panel="mesas">Mesas</button>
      <button type="button" class="panel-tabs__btn" id="tabMenu" role="tab" aria-selected="false" data-panel="menu">Menú</button>
    </nav>

    <main class="panel-main">
      <!-- Pedidos -->
      <section class="panel-view panel-view--active" id="viewPedidos" role="tabpanel" aria-labelledby="tabPedidos">
        <div class="panel-empty" id="emptyState" hidden>
          <span class="panel-empty__icon" aria-hidden="true">✓</span>
          <p class="panel-empty__title">Sin pedidos activos</p>
          <p class="panel-empty__text">Los nuevos pedidos aparecerán aquí automáticamente.</p>
        </div>
        <div class="panel-orders" id="ordersList"></div>
      </section>

      <!-- Mesas -->
      <section class="panel-view" id="viewMesas" role="tabpanel" aria-labelledby="tabMesas" hidden>
        <div class="panel-mesas" id="mesasList"></div>
      </section>

      <!-- Menú -->
      <section class="panel-view" id="viewMenu" role="tabpanel" aria-labelledby="tabMenu" hidden>
        <div class="menu-toolbar">
          <p class="menu-toolbar__hint">Productos del restaurante</p>
          <button type="button" class="menu-toolbar__btn" id="addProductBtn">+ Agregar producto</button>
        </div>
        <div class="menu-sections" id="menuList"></div>
      </section>
    </main>

    <!-- Modal cuenta mesa -->
    <div class="modal" id="accountModal" hidden aria-hidden="true">
      <div class="modal__backdrop" data-close-modal></div>
      <div class="modal__box" role="dialog" aria-labelledby="modalTitle">
        <header class="modal__head">
          <h2 class="modal__title" id="modalTitle">Cuenta Mesa 1</h2>
          <button type="button" class="modal__close" data-close-modal aria-label="Cerrar">×</button>
        </header>
        <ul class="modal__invoice" id="modalInvoice"></ul>
        <div class="modal__total">
          <span>Total</span>
          <strong id="modalTotal">$0</strong>
        </div>
      </div>
    </div>

    <!-- Modal producto -->
    <div class="modal" id="productModal" hidden aria-hidden="true">
      <div class="modal__backdrop" data-close-product-modal></div>
      <div class="modal__box modal__box--form" role="dialog" aria-labelledby="productModalTitle">
        <header class="modal__head">
          <h2 class="modal__title" id="productModalTitle">Agregar producto</h2>
          <button type="button" class="modal__close" data-close-product-modal aria-label="Cerrar">×</button>
        </header>
        <form class="product-form" id="productForm">
          <input type="hidden" id="productId">
          <label class="product-form__field">
            <span>Nombre</span>
            <input type="text" id="productNombre" required maxlength="120">
          </label>
          <label class="product-form__field">
            <span>Descripción</span>
            <textarea id="productDescripcion" rows="3" maxlength="500"></textarea>
          </label>
          <div class="product-form__row">
            <label class="product-form__field">
              <span>Precio (COP)</span>
              <input type="number" id="productPrecio" required min="0" step="100">
            </label>
            <label class="product-form__field">
              <span>Categoría</span>
              <input type="text" id="productCategoria" required maxlength="60" placeholder="Ej: Entradas">
            </label>
          </div>
          <label class="product-form__toggle">
            <input type="checkbox" id="productDisponible" checked>
            <span>Disponible en la carta</span>
          </label>
          <div class="product-form__actions">
            <button type="button" class="product-form__btn product-form__btn--ghost" data-close-product-modal>Cancelar</button>
            <button type="submit" class="product-form__btn product-form__btn--primary" id="productSaveBtn">Guardar</button>
          </div>
        </form>
      </div>
    </div>

    <div class="panel-toast" id="toast" role="status" aria-live="polite"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="restaurant.js"></script>
  <script src="panel.js"></script>
  <script src="panel-menu.js"></script>
</body>
</html>
